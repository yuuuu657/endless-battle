{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>🔧 管理者ページ</h2>
  <table>
    <tr><th>名前</th><th>EXP</th><th>GOLD</th><th>武器</th><th>防具</th><th></th></tr>
    {% for p in players %}
    <tr>
      <td>{{ p.name }}</td>
      <td>{{ p.exp }}</td>
      <td>{{ p.gold }}</td>
      <td>{{ weapons[p.weapon_id].name }}</td>
      <td>{{ armors[p.armor_id].name }}</td>
      <td>
        <form method="post">
          <input type="hidden" name="name" value="{{ p.name }}">
          EXP:<input type="number" name="exp" value="{{ p.exp }}" style="width:80px">
          GOLD:<input type="number" name="gold" value="{{ p.gold }}" style="width:80px">
          武器ID(1-8):<input type="number" name="weapon_id" value="{{ p.weapon_id }}" style="width:50px">
          防具ID(1-8):<input type="number" name="armor_id" value="{{ p.armor_id }}" style="width:50px">
          <button class="btn btn-sm btn-primary" type="submit">更新</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
